<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MaQuickPage · Suivi des maquettes</title>
<style>
  :root{--gold:#C8A24B;--gold-d:#A8842F;--ink:#15130E;--bg:#f6f4ef;--card:#fff;--border:#e7e2d6;--muted:#8a8270;--blue:#002FA7;--ok:#138a36;--hot:#c0392b;--cool:#5b6470;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;padding-bottom:40px;}
  header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;}
  .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
  .spacer{flex:1;}
  .updated{font-size:12px;color:var(--muted);}
  .lang-switcher{display:inline-flex;gap:4px;}
  .lang-btn{border:1px solid var(--border);background:#fff;color:var(--cool);padding:5px 9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
  .lang-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.act{border:1px solid var(--border);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;}
  button.act:active{transform:scale(.97);}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center;}
  .controls input[type=search]{flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;outline:none;}
  .controls input:focus{border-color:var(--gold);}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--cool);cursor:pointer;user-select:none;}
  main{padding:16px;max-width:1100px;margin:0 auto;}
  .msg{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}
  .msg a{color:var(--blue);font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
  .kpi .v{font-size:28px;font-weight:800;line-height:1;}
  .kpi .l{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:600;}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .kpi.hot .v{color:var(--hot);}.kpi.ok .v{color:var(--ok);}.kpi.gold .v{color:var(--gold-d);}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px;}
  .funnel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .frow{display:flex;align-items:center;gap:12px;margin-bottom:9px;}.frow:last-child{margin-bottom:0;}
  .fname{width:160px;flex-shrink:0;font-size:13.5px;font-weight:600;}
  .fbar-wrap{flex:1;background:#efeada;border-radius:8px;overflow:hidden;height:26px;position:relative;}
  .fbar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-d));border-radius:8px;min-width:2px;}
  .fval{position:absolute;right:10px;top:0;height:26px;display:flex;align-items:center;font-size:12.5px;font-weight:700;}
  .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:11px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;}
  th:hover{color:var(--ink);}
  td{padding:11px 12px;border-bottom:1px solid #f0ece1;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .salon{font-weight:700;}.loc{font-size:12px;color:var(--muted);}.email{font-size:12.5px;color:var(--cool);}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
  .b-client{background:#dcfce7;color:#14532d;}.b-hot{background:#fde2e0;color:#9b2c22;}.b-warm{background:#fef3c7;color:#92400e;}.b-tiede{background:#e0e7ff;color:#3730a3;}.b-cold{background:#eef0f2;color:#5b6470;}
  .when{font-size:12px;color:var(--muted);white-space:nowrap;}
  .tlink{color:var(--blue);text-decoration:none;font-weight:600;font-size:13px;}
  .scrollbar{height:6px;background:#efeada;border-radius:4px;width:60px;overflow:hidden;display:inline-block;vertical-align:middle;}
  .scrollbar>i{display:block;height:100%;background:var(--gold-d);}
  @media(max-width:680px){.fname{width:120px;font-size:12px;}td,th{padding:9px 8px;}.hide-sm{display:none;}}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand"><span class="dot"></span> <span id="t-brand">Suivi des maquettes</span></div>
    <span class="spacer"></span>
    <span class="lang-switcher">
      <button class="lang-btn" data-lang="fr" type="button">FR</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
      <button class="lang-btn" data-lang="zh" type="button">中</button>
    </span>
    <span class="updated" id="updated"></span>
    <button class="act" id="refresh">↻ Actualiser</button>
    <button class="act" id="export">⬇ CSV</button>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Rechercher…" autocomplete="off">
    <label class="toggle"><input type="checkbox" id="humansOnly" checked> <span id="t-humans">Humains seulement</span></label>
    <label class="toggle"><input type="checkbox" id="autorefresh"> <span id="t-auto">Auto (60s)</span></label>
  </div>
</header>
<main><div id="content"><div class="msg" id="t-loading">Chargement…</div></div></main>

<script>
(function(){
  'use strict';
  var CSV_URL='/admin/api/preview-visits.csv', PREVIEW_BASE='https://maquickpage.fr/preview/';
  var $=function(id){return document.getElementById(id);};
  var raw=[], sortKey='heat', sortDir=-1, autoTimer=null;

  var T={
    fr:{brand:'Suivi des maquettes',refresh:'Actualiser',exp:'CSV',maj:'maj',search:'Rechercher salon, ville, email…',humans:'Humains seulement',auto:'Auto (60s)',loading:'Chargement…',
      k_visited:'Salons visités',k_pricing:'Ont vu les tarifs',k_domains:'Ont vu les domaines',k_edited:'Ont édité leur démo',k_edited_sub:'signal très chaud',k_pay:'Paiement initié',k_clients:'Devenus clients',k_human:'Trafic humain',k_human_sub:'{n} bots filtrés',
      funnel_title:'Entonnoir comportemental',f_visited:'Visité la maquette',f_pricing:'A vu les tarifs',f_domains:'A vu les domaines',f_pay:'Paiement initié',f_client:'Devenu client',
      recall:'À rappeler',th_salon:'Salon',th_level:'Niveau',th_visits:'Visites',th_scroll:'Scroll',th_last:'Dernière activité',
      st_client:'✅ Client',st_hot:'🔥 Presque client',st_email:'Chaud · étape email',st_dom:'Intéressé · a vu domaines',st_pricing:'A vu les tarifs',st_visit:'A visité',
      see:'Voir →',none:'Aucune visite pour le moment.',notfound:'Aucun salon trouvé.',auth:'Connecte-toi d\'abord à l\'admin, puis recharge cette page.',signin:'→ Se connecter',err:'Erreur de chargement : ',u_min:'min',u_h:'h',u_d:'j',max60:'60 max affichés'},
    en:{brand:'Mockup tracking',refresh:'Refresh',exp:'CSV',maj:'upd.',search:'Search salon, city, email…',humans:'Humans only',auto:'Auto (60s)',loading:'Loading…',
      k_visited:'Salons visited',k_pricing:'Saw pricing',k_domains:'Saw domains',k_edited:'Edited their demo',k_edited_sub:'very hot signal',k_pay:'Payment started',k_clients:'Became clients',k_human:'Human traffic',k_human_sub:'{n} bots filtered',
      funnel_title:'Behavioral funnel',f_visited:'Visited the mockup',f_pricing:'Saw pricing',f_domains:'Saw domains',f_pay:'Payment started',f_client:'Became client',
      recall:'To call',th_salon:'Salon',th_level:'Level',th_visits:'Visits',th_scroll:'Scroll',th_last:'Last activity',
      st_client:'✅ Client',st_hot:'🔥 Near client',st_email:'Hot · email step',st_dom:'Interested · saw domains',st_pricing:'Saw pricing',st_visit:'Visited',
      see:'View →',none:'No visits yet.',notfound:'No salon found.',auth:'Log into the admin first, then reload this page.',signin:'→ Sign in',err:'Load error: ',u_min:'min',u_h:'h',u_d:'d',max60:'60 max shown'},
    zh:{brand:'样板追踪',refresh:'刷新',exp:'CSV',maj:'更新',search:'搜索沙龙、城市、邮箱…',humans:'仅真人',auto:'自动 (60秒)',loading:'加载中…',
      k_visited:'已访问的沙龙',k_pricing:'查看了价格',k_domains:'查看了域名',k_edited:'编辑了样板',k_edited_sub:'非常热门的信号',k_pay:'已发起付款',k_clients:'已成为客户',k_human:'真人流量',k_human_sub:'已过滤 {n} 个机器人',
      funnel_title:'行为漏斗',f_visited:'访问了样板',f_pricing:'查看了价格',f_domains:'查看了域名',f_pay:'已发起付款',f_client:'已成为客户',
      recall:'待联系',th_salon:'沙龙',th_level:'级别',th_visits:'访问次数',th_scroll:'滚动',th_last:'最近活动',
      st_client:'✅ 客户',st_hot:'🔥 接近成交',st_email:'热门 · 邮箱步骤',st_dom:'感兴趣 · 看了域名',st_pricing:'查看了价格',st_visit:'已访问',
      see:'查看 →',none:'暂无访问。',notfound:'未找到沙龙。',auth:'请先登录管理后台，然后刷新此页面。',signin:'→ 登录',err:'加载错误：',u_min:'分钟',u_h:'小时',u_d:'天',max60:'最多显示60条'}
  };
  var lang=(function(){try{var s=localStorage.getItem('outil-coiffure-lang');return T[s]?s:'fr';}catch(e){return 'fr';}})();
  function t(k,p){var s=(T[lang]&&T[lang][k])||T.fr[k]||k; if(p)for(var x in p)s=s.replace('{'+x+'}',p[x]); return s;}

  function applyStatic(){
    document.documentElement.lang=lang==='zh'?'zh-CN':lang;
    $('t-brand').textContent=t('brand');
    $('refresh').textContent='↻ '+t('refresh');
    $('export').textContent='⬇ '+t('exp');
    $('q').placeholder=t('search');
    $('t-humans').textContent=t('humans');
    $('t-auto').textContent=t('auto');
    Array.prototype.forEach.call(document.querySelectorAll('.lang-btn'),function(b){b.classList.toggle('active',b.dataset.lang===lang);});
  }
  function setLang(l){ if(!T[l])return; lang=l; try{localStorage.setItem('outil-coiffure-lang',l);}catch(e){} applyStatic(); if(raw.length)render(); }

  var STAGE={preview_ouvert:1,scroll_max:1,editeur_ouvert:2,pricing_ouvert:2,etape_domaine:3,etape_email:4,editeur_modifie:5,paiement_initie:5};
  function stageLabel(score,client){ if(client)return['b-client',t('st_client')]; if(score>=5)return['b-hot',t('st_hot')]; if(score>=4)return['b-warm',t('st_email')]; if(score>=3)return['b-warm',t('st_dom')]; if(score>=2)return['b-tiede',t('st_pricing')]; return['b-cold',t('st_visit')]; }
  var BOT_RE=/bot|crawl|spider|slurp|curl|wget|python|http-client|headless|phantom|preview|scan|proofpoint|mimecast|barracuda|safelinks|googleimageproxy|facebookexternalhit|whatsapp|bingpreview|yandex|ahrefs|semrush|monitor/i;
  function isBot(ua){return !ua||BOT_RE.test(ua);}

  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    var rows=[],row=[],cur='',q=false,i=0,c;
    for(;i<text.length;i++){c=text[i];
      if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
      else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c==='\r'){}else cur+=c;}}
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    if(!rows.length)return[];
    var head=rows[0],out=[];
    for(var r=1;r<rows.length;r++){if(rows[r].length===1&&rows[r][0]==='')continue;var o={};for(var k=0;k<head.length;k++)o[head[k]]=rows[r][k]||'';out.push(o);}
    return out;
  }
  function aggregate(events){
    var bySlug={};
    events.forEach(function(e){var slug=e.slug;if(!slug)return;
      var s=bySlug[slug]||(bySlug[slug]={slug:slug,salon:e.salon||slug,ville:e.ville||'',email:e.email||'',status:e.subscription_status||'',heat:0,last:'',visits:0,scroll:0,events:{}});
      if(e.salon)s.salon=e.salon;if(e.ville)s.ville=e.ville;if(e.email)s.email=e.email;if(e.subscription_status)s.status=e.subscription_status;
      var st=STAGE[e.event]||0;if(st>s.heat)s.heat=st;s.events[e.event]=(s.events[e.event]||0)+1;
      if(e.event==='preview_ouvert')s.visits++;
      if(e.event==='scroll_max'&&e.meta){try{var m=JSON.parse(e.meta);if(m.pct>s.scroll)s.scroll=m.pct;}catch(x){}}
      if(e.ts>s.last)s.last=e.ts;});
    return Object.keys(bySlug).map(function(k){return bySlug[k];});
  }
  function isClient(s){return s.status==='live'||s.status==='active'||s.status==='trialing';}
  function fmtWhen(ts){ if(!ts)return'—'; var v=Date.parse(ts.replace(' ','T')+'Z'); if(isNaN(v))return ts; var d=(Date.now()-v)/1000;
    if(d<3600)return Math.max(1,Math.round(d/60))+' '+t('u_min'); if(d<86400)return Math.round(d/3600)+' '+t('u_h'); return Math.round(d/86400)+' '+t('u_d'); }
  function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function kpi(v,l,sub,cls){return'<div class="kpi '+(cls||'')+'"><div class="v">'+v+'</div><div class="l">'+l+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';}
  function frow(name,val,max){var pct=Math.round(val/max*100);return'<div class="frow"><div class="fname">'+name+'</div><div class="fbar-wrap"><div class="fbar" style="width:'+pct+'%"></div><span class="fval">'+val+'</span></div></div>';}

  function render(){
    var humansOnly=$('humansOnly').checked;
    var events=humansOnly?raw.filter(function(e){return !isBot(e.user_agent);}):raw;
    var salons=aggregate(events);
    var q=($('q').value||'').toLowerCase().trim();
    if(q)salons=salons.filter(function(s){return(s.salon+' '+s.ville+' '+s.email).toLowerCase().indexOf(q)>=0;});
    var visited=salons.length;
    var pricing=salons.filter(function(s){return s.heat>=2;}).length;
    var domains=salons.filter(function(s){return s.heat>=3;}).length;
    var pay=salons.filter(function(s){return s.events['paiement_initie'];}).length;
    var edited=salons.filter(function(s){return s.events['editeur_modifie'];}).length;
    var clients=salons.filter(isClient).length;
    var totalEvents=raw.length,botEvents=raw.filter(function(e){return isBot(e.user_agent);}).length;
    var humanPct=totalEvents?Math.round((totalEvents-botEvents)/totalEvents*100):0;

    var html='<div class="kpis">';
    html+=kpi(visited,t('k_visited'),'','');
    html+=kpi(pricing,t('k_pricing'),'','gold');
    html+=kpi(domains,t('k_domains'),'','gold');
    html+=kpi(edited,t('k_edited'),t('k_edited_sub'),'hot');
    html+=kpi(pay,t('k_pay'),'','hot');
    html+=kpi(clients,t('k_clients'),'','ok');
    html+=kpi(humanPct+'%',t('k_human'),t('k_human_sub',{n:botEvents}),'');
    html+='</div>';
    var maxF=Math.max(visited,1);
    html+='<div class="section-title">'+t('funnel_title')+'</div><div class="funnel">';
    html+=frow(t('f_visited'),visited,maxF)+frow(t('f_pricing'),pricing,maxF)+frow(t('f_domains'),domains,maxF)+frow(t('f_pay'),pay,maxF)+frow(t('f_client'),clients,maxF);
    html+='</div>';

    salons.sort(function(a,b){var av,bv;
      if(sortKey==='heat'){av=(isClient(a)?6:a.heat);bv=(isClient(b)?6:b.heat);if(av===bv){av=a.last;bv=b.last;}}
      else if(sortKey==='salon'){av=a.salon.toLowerCase();bv=b.salon.toLowerCase();}
      else if(sortKey==='visits'){av=a.visits;bv=b.visits;}
      else{av=a.last;bv=b.last;}
      return av<bv?-1*sortDir:(av>bv?1*sortDir:0);});

    html+='<div class="section-title">'+t('recall')+' ('+salons.length+')</div>';
    if(!salons.length)html+='<div class="msg">'+t('none')+'</div>';
    else{
      html+='<div class="tbl-wrap"><table><thead><tr>'
        +'<th data-k="salon">'+t('th_salon')+'</th><th data-k="heat">'+t('th_level')+'</th>'
        +'<th data-k="visits" class="hide-sm">'+t('th_visits')+'</th><th class="hide-sm">'+t('th_scroll')+'</th>'
        +'<th data-k="last">'+t('th_last')+'</th><th></th></tr></thead><tbody>';
      salons.forEach(function(s){var sl=stageLabel(s.heat,isClient(s));
        html+='<tr><td><div class="salon">'+esc(s.salon)+'</div><div class="loc">'+esc(s.ville)+'</div>'+(s.email?'<div class="email">'+esc(s.email)+'</div>':'')+'</td>'
          +'<td><span class="badge '+sl[0]+'">'+esc(sl[1])+'</span></td>'
          +'<td class="hide-sm">'+s.visits+'</td>'
          +'<td class="hide-sm"><span class="scrollbar"><i style="width:'+(s.scroll||0)+'%"></i></span> '+(s.scroll||0)+'%</td>'
          +'<td class="when">'+fmtWhen(s.last)+'</td>'
          +'<td><a class="tlink" href="'+PREVIEW_BASE+encodeURIComponent(s.slug)+'" target="_blank" rel="noopener">'+t('see')+'</a></td></tr>';});
      html+='</tbody></table></div>';
    }
    $('content').innerHTML=html;
    Array.prototype.forEach.call(document.querySelectorAll('th[data-k]'),function(th){
      th.onclick=function(){var k=th.getAttribute('data-k');if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='salon')?1:-1;}render();};});
  }

  function load(){
    $('updated').textContent='…';
    fetch(CSV_URL+'?t='+Date.now(),{credentials:'same-origin',cache:'no-store'}).then(function(r){
      if(r.status===401||r.status===302||r.redirected)throw new Error('auth');
      if(!r.ok)throw new Error('http '+r.status);
      return r.text();
    }).then(function(txt){
      if(/<!doctype html|<html/i.test(txt.slice(0,200)))throw new Error('auth');
      raw=parseCSV(txt);
      var n=new Date();
      $('updated').textContent=t('maj')+' '+n.getHours()+'h'+('0'+n.getMinutes()).slice(-2);
      render();
    }).catch(function(e){
      if(e.message==='auth')$('content').innerHTML='<div class="msg">'+t('auth')+'<br><br><a href="/admin/login">'+t('signin')+'</a></div>';
      else $('content').innerHTML='<div class="msg">'+t('err')+esc(e.message)+'</div>';
      $('updated').textContent='';
    });
  }

  Array.prototype.forEach.call(document.querySelectorAll('.lang-btn'),function(b){b.onclick=function(){setLang(b.dataset.lang);};});
  $('refresh').onclick=load;
  $('export').onclick=function(){window.open(CSV_URL,'_blank');};
  $('q').addEventListener('input',function(){if(raw.length)render();});
  $('humansOnly').addEventListener('change',function(){if(raw.length)render();});
  $('autorefresh').addEventListener('change',function(){if(this.checked)autoTimer=setInterval(load,60000);else clearInterval(autoTimer);});
  applyStatic();
  load();
})();
</script>
</body>
</html>
