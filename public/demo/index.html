<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MaQuickPage — Démo express</title>
<style>
  :root {
    --gold: #C8A24B; --gold-dark: #A8842F; --ink: #15130E; --bg: #faf8f3;
    --card: #fff; --border: #e7e2d6; --muted: #8a8270; --blue: #002FA7;
    --ok: #138a36; --danger: #c0392b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.4;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 17px; margin-bottom: 10px; }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); }
  .search-wrap { position: relative; }
  #q {
    width: 100%; padding: 14px 16px; font-size: 17px; border: 1.5px solid var(--border);
    border-radius: 12px; background: #fff; outline: none;
  }
  #q:focus { border-color: var(--gold); }
  .hint { font-size: 13px; color: var(--muted); margin: 8px 2px 0; }
  main { padding: 12px 16px 40px; }
  .count { font-size: 13px; color: var(--muted); margin: 6px 2px 12px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px; margin-bottom: 12px; display: flex; gap: 12px;
  }
  .thumb {
    width: 84px; height: 84px; flex-shrink: 0; border-radius: 10px; object-fit: cover;
    background: #efeada; border: 1px solid var(--border);
  }
  .thumb.placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px; text-align: center; }
  .info { flex: 1; min-width: 0; }
  .name { font-weight: 700; font-size: 16px; margin: 0 0 2px; word-break: break-word; }
  .loc { font-size: 13px; color: var(--muted); margin: 0 0 10px; }
  .actions { display: flex; flex-wrap: wrap; gap: 7px; }
  .btn {
    border: 1px solid var(--border); background: #fff; color: var(--ink);
    padding: 8px 12px; border-radius: 9px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-blue { background: var(--blue); color: #fff; border-color: var(--blue); }
  .mailrow { display: none; margin-top: 9px; gap: 7px; }
  .mailrow.open { display: flex; }
  .mailrow input {
    flex: 1; min-width: 0; padding: 9px 11px; font-size: 15px;
    border: 1.5px solid var(--border); border-radius: 9px; outline: none;
  }
  .mailrow input:focus { border-color: var(--gold); }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #d8d2c2; border-top-color: var(--gold-dark); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: all .25s; z-index: 50;
    max-width: 90vw; text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok { background: var(--ok); } #toast.err { background: var(--danger); }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span> MaQuickPage · Démo express</div>
  <div class="search-wrap">
    <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="off"
           placeholder="Ville ou nom du salon…" enterkeyhint="search">
  </div>
  <div class="hint">Tapez une ville (ex : Lyon) ou le nom d'un salon.</div>
</header>
<main>
  <div class="count" id="count"></div>
  <div id="results"></div>
</main>
<div id="toast"></div>

<script>
(function () {
  'use strict';
  // Le secret = 1er segment du path (/{SECRET})
  const SECRET = location.pathname.split('/').filter(Boolean)[0] || '';
  const API = '/' + SECRET + '/api';

  const $q = document.getElementById('q');
  const $results = document.getElementById('results');
  const $count = document.getElementById('count');
  const $toast = document.getElementById('toast');

  let toastTimer = null;
  function toast(msg, kind) {
    $toast.textContent = msg;
    $toast.className = 'show' + (kind ? ' ' + kind : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { $toast.className = $toast.className.replace('show', '').trim(); }, 2600);
  }

  function esc(s) {
    return s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function card(s) {
    const loc = [s.code_postal, s.ville].filter(Boolean).join(' ');
    const thumb = s.screenshot
      ? `<img class="thumb" src="${esc(s.screenshot)}" alt="" loading="lazy">`
      : `<div class="thumb placeholder">pas<br>d'aperçu</div>`;
    return `
      <div class="card" data-slug="${esc(s.slug)}">
        ${thumb}
        <div class="info">
          <p class="name">${esc(s.nom)}</p>
          <p class="loc">${esc(loc)}</p>
          <div class="actions">
            <a class="btn btn-primary" href="${esc(s.preview)}" target="_blank" rel="noopener">Visiter</a>
            <button class="btn" data-act="copy">Copier liens</button>
            <button class="btn btn-blue" data-act="mail">Mail</button>
          </div>
          <div class="mailrow">
            <input type="email" inputmode="email" autocomplete="email" placeholder="email@client.com">
            <button class="btn btn-primary" data-act="send">Envoyer</button>
          </div>
        </div>
      </div>`;
  }

  // Données des résultats indexées par slug pour les actions
  const byslug = {};

  async function search(q) {
    if (q.trim().length < 2) { $results.innerHTML = ''; $count.textContent = ''; return; }
    $count.innerHTML = '<span class="spinner"></span> Recherche…';
    try {
      const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const list = data.results || [];
      Object.keys(byslug).forEach(k => delete byslug[k]);
      list.forEach(s => byslug[s.slug] = s);
      if (list.length === 0) {
        $results.innerHTML = '<div class="empty">Aucun salon trouvé pour « ' + esc(q) + ' ».</div>';
        $count.textContent = '';
      } else {
        $count.textContent = list.length + ' salon' + (list.length > 1 ? 's' : '') + (data.count >= 60 ? ' (60 max affichés)' : '');
        $results.innerHTML = list.map(card).join('');
      }
    } catch (e) {
      $count.textContent = '';
      $results.innerHTML = '<div class="empty">Erreur réseau, réessayez.</div>';
    }
  }

  // Debounce
  let t = null;
  $q.addEventListener('input', () => { clearTimeout(t); t = setTimeout(() => search($q.value), 280); });
  $q.addEventListener('search', () => search($q.value));

  // Délégation des actions
  $results.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const cardEl = e.target.closest('.card');
    const slug = cardEl?.dataset.slug;
    const s = byslug[slug];
    if (!s) return;
    const act = btn.dataset.act;

    if (act === 'copy') {
      const msg = `Bonjour, voici un site de démonstration que nous avons préparé pour ${s.nom} :\n\n👉 ${s.preview}\n\nPour le modifier vous-même : ${s.admin}`;
      try {
        await navigator.clipboard.writeText(msg);
        toast('Liens copiés ✓ (collez dans WhatsApp)', 'ok');
      } catch {
        // Fallback : sélection manuelle
        const ta = document.createElement('textarea');
        ta.value = msg; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); toast('Liens copiés ✓', 'ok'); }
        catch { toast('Copie impossible', 'err'); }
        ta.remove();
      }
    }

    if (act === 'mail') {
      const row = cardEl.querySelector('.mailrow');
      row.classList.toggle('open');
      if (row.classList.contains('open')) row.querySelector('input').focus();
    }

    if (act === 'send') {
      const row = cardEl.querySelector('.mailrow');
      const input = row.querySelector('input');
      const email = (input.value || '').trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email invalide', 'err'); input.focus(); return; }
      btn.disabled = true; btn.textContent = '…';
      try {
        const res = await fetch(`${API}/send-email`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: s.slug, email })
        });
        const data = await res.json();
        if (res.ok && data.ok) { toast('Mail envoyé à ' + email + ' ✓', 'ok'); row.classList.remove('open'); input.value = ''; }
        else { toast(data.error || 'Envoi échoué', 'err'); }
      } catch { toast('Erreur réseau', 'err'); }
      btn.disabled = false; btn.textContent = 'Envoyer';
    }
  });

  $q.focus();
})();
</script>
</body>
</html>
