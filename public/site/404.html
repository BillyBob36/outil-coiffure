<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page introuvable</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #f8f5f0; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; margin: 0 0 16px; color: #c9a96e; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; margin: 0 0 24px; }
        p { color: #6b6b6b; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <h2>Cette page n'existe pas</h2>
        <p>Le salon de coiffure que vous recherchez n'a pas été trouvé. Vérifiez le lien et réessayez.</p>
    </div>
</body>
</html>
